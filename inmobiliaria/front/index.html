<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="layout.css" rel="stylesheet">
    <style>
        /* ── Tarjetas stat ── */
        .stat-card {
            border: none;
            border-radius: 14px;
            padding: 20px;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .stat-card .stat-icon {
            font-size: 2.2rem;
            opacity: 0.8;
        }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.85rem; opacity: 0.85; }
 
        .bg-stat-1 { background: linear-gradient(135deg, #0f3460, #16213e); }
        .bg-stat-2 { background: linear-gradient(135deg, #1d7a5f, #145c46); }
        .bg-stat-3 { background: linear-gradient(135deg, #b5451b, #8c3414); }
        .bg-stat-4 { background: linear-gradient(135deg, #7b3fa0, #5c2d7a); }
    </style>
</head>
<body>
 
<div class="container-fluid p-0">
<div class="row g-0">
 
    <!-- ══ SIDEBAR ══════════════════════════════════════════════════ -->
    <div class="col-2 sidebar" id="sidebar"></div>
 
    <!-- ══ CONTENIDO PRINCIPAL ════════════════════════════════════════ -->
    <div class="col-10">
 
        <!-- Topbar -->
        <div class="topbar">
            <h5 class="page-title"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" style="font-size:0.88rem;" id="bienvenida">
                    <i class="bi bi-person-circle me-1"></i>Cargando...
                </span>
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </div>
 
        <!-- Contenido -->
        <div class="p-4">
 
            <!-- Estado del servidor -->
            <div id="alertaServidor" class="alert alert-warning d-none">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <strong>Advertencia:</strong> No se pudo conectar con el servidor backend.
            </div>
 
            <!-- Tarjetas de estadísticas -->
            <div class="row g-3 mb-4">
 
                <div class="col-md-3">
                    <div class="stat-card bg-stat-1">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-label">Total Apartamentos</div>
                                <div class="stat-value" id="totalApartamentos">—</div>
                            </div>
                            <div class="stat-icon"><i class="bi bi-house-door"></i></div>
                        </div>
                    </div>
                </div>
 
                <div class="col-md-3">
                    <div class="stat-card bg-stat-2">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-label">Contratos Activos</div>
                                <div class="stat-value" id="totalContratos">—</div>
                            </div>
                            <div class="stat-icon"><i class="bi bi-file-earmark-text"></i></div>
                        </div>
                    </div>
                </div>
 
                <div class="col-md-3">
                    <div class="stat-card bg-stat-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-label">Total Clientes</div>
                                <div class="stat-value" id="totalClientes">—</div>
                            </div>
                            <div class="stat-icon"><i class="bi bi-person-check"></i></div>
                        </div>
                    </div>
                </div>
 
                <div class="col-md-3">
                    <div class="stat-card bg-stat-4">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-label">Total Usuarios</div>
                                <div class="stat-value" id="totalUsuarios">—</div>
                            </div>
                            <div class="stat-icon"><i class="bi bi-people"></i></div>
                        </div>
                    </div>
                </div>
 
            </div>
 
            <!-- Accesos rápidos -->
            <h6 class="text-secondary fw-bold mb-3">
                <i class="bi bi-lightning-charge me-1"></i>Accesos Rápidos
            </h6>
            <div class="row g-3">
 
                <div class="col-md-4">
                    <a href="apartamento/apartamento.html" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100 p-3 d-flex flex-row align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:48px;height:48px;background:#e8f0f7;">
                                <i class="bi bi-house-door fs-4 text-primary"></i>
                            </div>
                            <div>
                                <div class="fw-semibold text-dark">Apartamentos</div>
                                <div class="text-muted" style="font-size:0.82rem;">Gestionar inmuebles</div>
                            </div>
                        </div>
                    </a>
                </div>
 
                <div class="col-md-4">
                    <a href="contrato/contrato.html" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100 p-3 d-flex flex-row align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:48px;height:48px;background:#e8f7f0;">
                                <i class="bi bi-file-earmark-text fs-4 text-success"></i>
                            </div>
                            <div>
                                <div class="fw-semibold text-dark">Contratos</div>
                                <div class="text-muted" style="font-size:0.82rem;">Gestionar arriendos</div>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="empleado/empleado.html" class="text-decoration-none">
                        <div class="card border-0 shadow-sm h-100 p-3 d-flex flex-row align-items-center gap-3">
                            <div class="rounded-circle d-flex align-items-center justify-content-center"
                                 style="width:48px;height:48px;background:#fef3e2;">
                                <i class="bi bi-people fs-4 text-warning" style="color:#ff9800;"></i>
                            </div>
                            <div>
                                <div class="fw-semibold text-dark">Empleados</div>
                                <div class="text-muted" style="font-size:0.82rem;">Gestionar personal</div>
                            </div>
                        </div>
                    </a>
                </div>
 
            </div>
 
        </div>
    </div>
 
</div>
</div>
 
<script src="api.js"></script>
<script src="utils.js"></script>
<script>
document.getElementById("sidebar").innerHTML = getSidebarRoot("dashboard");
 
document.addEventListener("DOMContentLoaded", async () => {
    const usuario = checkSesion();
    if (!usuario) return;
    document.getElementById("bienvenida").innerHTML =
        `<i class="bi bi-person-circle me-1"></i>${usuario.nombreUsuario}`;
 
    // Cargar estadísticas
    try {
        const [apRes, conRes, cliRes, usrRes] = await Promise.all([
            fetch(API.apartamentos), fetch(API.contratos),
            fetch(API.clientes), fetch(API.usuarios)
        ]);
        const [aps, cons, clis, usrs] = await Promise.all([apRes.json(), conRes.json(), cliRes.json(), usrRes.json()]);
        document.getElementById("totalApartamentos").textContent = aps.length;
        document.getElementById("totalContratos").textContent = cons.filter(c => c.estado === "ACTIVO").length;
        document.getElementById("totalClientes").textContent = clis.length;
        document.getElementById("totalUsuarios").textContent = usrs.length;
    } catch {
        document.getElementById("alertaServidor").classList.remove("d-none");
    }
});
</script>
 
</body>
</html>
