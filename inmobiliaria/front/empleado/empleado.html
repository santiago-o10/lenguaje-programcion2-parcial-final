<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../layout.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0"><div class="row g-0">
    <div class="col-2 sidebar" id="sidebar"></div>
    <div class="col-10">
        <div class="topbar">
            <h5 class="page-title"><i class="bi bi-person-badge me-2"></i>Empleados</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" style="font-size:0.88rem;" id="bienvenida"></span>
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Salir</button>
            </div>
        </div>
        <div class="p-4">
            <div id="alerta" class="alert" style="display:none"></div>
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold mb-3" id="formTitle">Nuevo Empleado</h6>
                    <input type="hidden" id="idEditar">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <select id="persona" class="form-select"><option value="">Seleccione Persona *</option></select>
                        </div>
                        <div class="col-md-3"><input type="text" id="cargo" class="form-control" placeholder="Cargo"></div>
                        <div class="col-md-2"><input type="number" id="salario" class="form-control" placeholder="Salario" step="0.01"></div>
                        <div class="col-md-3 d-flex gap-2">
                            <button onclick="guardar()" class="btn btn-primary flex-fill"><i class="bi bi-save"></i> Guardar</button>
                            <button onclick="limpiar()" class="btn btn-secondary flex-fill"><i class="bi bi-x-circle"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark"><tr><th>#</th><th>Persona</th><th>Cargo</th><th>Salario</th><th>Acciones</th></tr></thead>
                        <tbody id="tabla"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div></div>
<script src="../api.js"></script><script src="../utils.js"></script>
<script>
document.getElementById("sidebar").innerHTML = getSidebar("empleado");
const u = checkSesion();
if (u) document.getElementById("bienvenida").innerHTML = `<i class="bi bi-person-circle me-1"></i>${u.nombreUsuario}`;

cargarSelect("persona", API.personas, "idPersona", p => `${p.nombre} ${p.apellido}`);

async function cargar() {
    const res = await fetch(API.empleados);
    const data = await res.json();
    document.getElementById("tabla").innerHTML = data.map(e => `
        <tr>
            <td>${e.idEmpleado}</td>
            <td>${e.persona?.nombre||''} ${e.persona?.apellido||''}</td>
            <td>${e.cargo||''}</td>
            <td>${e.salario ? '$'+e.salario.toLocaleString() : ''}</td>
            <td>
                <button class="btn btn-sm btn-warning me-1" onclick='editar(${JSON.stringify(e)})'><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-danger" onclick="eliminar(${e.idEmpleado})"><i class="bi bi-trash"></i></button>
            </td>
        </tr>`).join("");
}

async function guardar() {
    const idPersona = document.getElementById("persona").value;
    if (!idPersona) return mostrarAlerta("alerta", "Seleccione una persona");
    const id = document.getElementById("idEditar").value;
    const body = {
        persona: { idPersona: parseInt(idPersona) },
        cargo: document.getElementById("cargo").value,
        salario: parseFloat(document.getElementById("salario").value) || null
    };
    const url = id ? `${API.empleados}/${id}` : API.empleados;
    await fetch(url, { method: id ? "PUT" : "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    limpiar(); cargar();
    mostrarAlerta("alerta", "Guardado correctamente", "success");
}

function editar(e) {
    document.getElementById("idEditar").value = e.idEmpleado;
    document.getElementById("persona").value = e.persona?.idPersona || "";
    document.getElementById("cargo").value = e.cargo || "";
    document.getElementById("salario").value = e.salario || "";
    document.getElementById("formTitle").textContent = "Editar Empleado";
}

async function eliminar(id) {
    if (!confirm("¿Eliminar?")) return;
    await fetch(`${API.empleados}/${id}`, { method: "DELETE" });
    cargar();
}

function limpiar() {
    ["idEditar","cargo","salario"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("persona").value = "";
    document.getElementById("formTitle").textContent = "Nuevo Empleado";
}

cargar();
</script>
</body></html>
