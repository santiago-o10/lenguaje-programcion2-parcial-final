<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../layout.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0"><div class="row g-0">
    <div class="col-2 sidebar" id="sidebar"></div>
    <div class="col-10">
        <div class="topbar">
            <h5 class="page-title"><i class="bi bi-map me-2"></i>Departamentos</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" style="font-size:0.88rem;" id="bienvenida"></span>
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Salir</button>
            </div>
        </div>
        <div class="p-4">
            <div id="alerta" class="alert" style="display:none"></div>
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold mb-3" id="formTitle">Nuevo Departamento</h6>
                    <input type="hidden" id="idEditar">
                    <div class="row g-2">
                        <div class="col-md-4">
                            <select id="pais" class="form-select"><option value="">Seleccione País *</option></select>
                        </div>
                        <div class="col-md-4"><input type="text" id="nombre" class="form-control" placeholder="Nombre del departamento *"></div>
                        <div class="col-md-2">
                            <button onclick="guardar()" class="btn btn-primary w-100"><i class="bi bi-save"></i> Guardar</button>
                        </div>
                        <div class="col-md-2">
                            <button onclick="limpiar()" class="btn btn-secondary w-100"><i class="bi bi-x-circle"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark"><tr><th>#</th><th>País</th><th>Nombre</th><th>Acciones</th></tr></thead>
                        <tbody id="tabla"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div></div>
<script src="../api.js"></script><script src="../utils.js"></script>
<script>
document.getElementById("sidebar").innerHTML = getSidebar("departamento");
const u = checkSesion();
if (u) document.getElementById("bienvenida").innerHTML = `<i class="bi bi-person-circle me-1"></i>${u.nombreUsuario}`;

cargarSelect("pais", API.paises, "idPais", p => p.nombre);

async function cargar() {
    const res = await fetch(API.departamentos);
    const data = await res.json();
    document.getElementById("tabla").innerHTML = data.map(d => `
        <tr>
            <td>${d.idDepartamento}</td><td>${d.pais?.nombre||''}</td><td>${d.nombre}</td>
            <td>
                <button class="btn btn-sm btn-warning me-1" onclick='editar(${JSON.stringify(d)})'><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-danger" onclick="eliminar(${d.idDepartamento})"><i class="bi bi-trash"></i></button>
            </td>
        </tr>`).join("");
}

async function guardar() {
    const nombre = document.getElementById("nombre").value.trim();
    const idPais = document.getElementById("pais").value;
    if (!nombre || !idPais) return mostrarAlerta("alerta", "País y nombre son requeridos");
    const id = document.getElementById("idEditar").value;
    const body = { nombre, pais: { idPais: parseInt(idPais) } };
    const url = id ? `${API.departamentos}/${id}` : API.departamentos;
    await fetch(url, { method: id ? "PUT" : "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    limpiar(); cargar();
    mostrarAlerta("alerta", "Guardado correctamente", "success");
}

function editar(d) {
    document.getElementById("idEditar").value = d.idDepartamento;
    document.getElementById("pais").value = d.pais?.idPais || "";
    document.getElementById("nombre").value = d.nombre;
    document.getElementById("formTitle").textContent = "Editar Departamento";
}

async function eliminar(id) {
    if (!confirm("¿Eliminar?")) return;
    await fetch(`${API.departamentos}/${id}`, { method: "DELETE" });
    cargar();
}

function limpiar() {
    document.getElementById("idEditar").value = "";
    document.getElementById("pais").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("formTitle").textContent = "Nuevo Departamento";
}

cargar();
</script>
</body></html>
