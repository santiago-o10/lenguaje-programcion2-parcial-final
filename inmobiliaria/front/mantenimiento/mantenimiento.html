<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mantenimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../layout.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid p-0"><div class="row g-0">
    <div class="col-2 sidebar" id="sidebar"></div>
    <div class="col-10">
        <div class="topbar">
            <h5 class="page-title"><i class="bi bi-tools me-2"></i>Mantenimiento</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="text-secondary" style="font-size:0.88rem;" id="bienvenida"></span>
                <button onclick="cerrarSesion()" class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Salir</button>
            </div>
        </div>
        <div class="p-4">
            <div id="alerta" class="alert" style="display:none"></div>
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h6 class="fw-bold mb-3" id="formTitle">Nuevo Mantenimiento</h6>
                    <input type="hidden" id="idEditar">
                    <div class="row g-2">
                        <div class="col-md-3"><select id="apartamento" class="form-select"><option value="">Apartamento *</option></select></div>
                        <div class="col-md-3"><select id="empleado" class="form-select"><option value="">Empleado *</option></select></div>
                        <div class="col-md-2"><input type="date" id="fecha" class="form-control"></div>
                        <div class="col-md-2"><input type="number" id="valor" class="form-control" placeholder="Valor *" step="0.01" min="0"></div>
                        <div class="col-md-3"><input type="text" id="descripcion" class="form-control" placeholder="Descripción" maxlength="50"></div>
                        <div class="col-md-3 d-flex gap-2">
                            <button onclick="guardar()" class="btn btn-primary flex-fill"><i class="bi bi-save"></i> Guardar</button>
                            <button onclick="limpiar()" class="btn btn-secondary flex-fill"><i class="bi bi-x-circle"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card border-0 shadow-sm">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark"><tr><th>#</th><th>Apartamento</th><th>Empleado</th><th>Fecha</th><th>Descripción</th><th>Valor</th><th>Acciones</th></tr></thead>
                        <tbody id="tabla"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div></div>
<script src="../api.js"></script><script src="../utils.js"></script>
<script>
document.getElementById("sidebar").innerHTML = getSidebar("mantenimiento");
const u = checkSesion();
if (u) document.getElementById("bienvenida").innerHTML = `<i class="bi bi-person-circle me-1"></i>${u.nombreUsuario}`;

cargarSelect("apartamento", API.apartamentos, "idApartamento", a => a.direccion);
cargarSelect("empleado", API.empleados, "idEmpleado", e => `${e.persona?.nombre||''} ${e.persona?.apellido||''}`);

async function cargar() {
    try {
        const res = await fetch(API.mantenimientos);
        if (!res.ok) throw new Error("Error al cargar");
        const data = await res.json();
        document.getElementById("tabla").innerHTML = data.map(m => `
            <tr>
                <td>${m.idMantenimiento}</td>
                <td>${m.apartamento?.direccion||''}</td>
                <td>${m.empleado?.persona?.nombre||''} ${m.empleado?.persona?.apellido||''}</td>
                <td>${m.fecha ? m.fecha.split('T')[0] : ''}</td>
                <td>${m.descripcion||''}</td>
                <td>${m.valor ? '$'+parseFloat(m.valor).toLocaleString('es-CO', {minimumFractionDigits:2, maximumFractionDigits:2}) : ''}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-1" onclick='editar(${JSON.stringify(m)})'><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="eliminar(${m.idMantenimiento})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`).join("");
    } catch (err) {
        document.getElementById("tabla").innerHTML = `<tr><td colspan="7" class="text-center text-danger">Error al cargar: ${err.message}</td></tr>`;
    }
}

async function guardar() {
    const idAp = document.getElementById("apartamento").value;
    const idEmp = document.getElementById("empleado").value;
    const fecha = document.getElementById("fecha").value;
    const valor = document.getElementById("valor").value;
    if (!idAp || !idEmp || !fecha || !valor) return mostrarAlerta("alerta", "Apartamento, empleado, fecha y valor son requeridos", "danger");
    
    const id = document.getElementById("idEditar").value;
    const body = {
        apartamento: { idApartamento: parseInt(idAp) },
        empleado: { idEmpleado: parseInt(idEmp) },
        fecha,
        descripcion: document.getElementById("descripcion").value,
        valor: parseFloat(valor)
    };
    
    try {
        const url = id ? `${API.mantenimientos}/${id}` : API.mantenimientos;
        const res = await fetch(url, { method: id ? "PUT" : "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
        
        if (!res.ok) {
            const error = await res.text();
            return mostrarAlerta("alerta", `Error: ${error}`, "danger");
        }
        
        limpiar();
        cargar();
        mostrarAlerta("alerta", "Guardado correctamente", "success");
    } catch (err) {
        mostrarAlerta("alerta", `Error de conexión: ${err.message}`, "danger");
    }
}

function editar(m) {
    document.getElementById("idEditar").value = m.idMantenimiento;
    document.getElementById("apartamento").value = m.apartamento?.idApartamento || "";
    document.getElementById("empleado").value = m.empleado?.idEmpleado || "";
    document.getElementById("fecha").value = m.fecha ? m.fecha.split('T')[0] : "";
    document.getElementById("descripcion").value = m.descripcion || "";
    document.getElementById("valor").value = m.valor || "";
    document.getElementById("formTitle").textContent = "Editar Mantenimiento";
}

async function eliminar(id) {
    if (!confirm("¿Eliminar?")) return;
    try {
        const res = await fetch(`${API.mantenimientos}/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Error al eliminar");
        cargar();
        mostrarAlerta("alerta", "Mantenimiento eliminado", "success");
    } catch (err) {
        mostrarAlerta("alerta", `Error: ${err.message}`, "danger");
    }
}

function limpiar() {
    ["idEditar","fecha","descripcion","valor"].forEach(id => document.getElementById(id).value = "");
    ["apartamento","empleado"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("formTitle").textContent = "Nuevo Mantenimiento";
}

cargar();
</script>
</body></html>
