<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-login {
            width: 100%;
            max-width: 420px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .brand-header {
            background: #0f3460;
            padding: 36px 24px;
            text-align: center;
        }
        .brand-header .brand-icon {
            font-size: 3rem;
            color: #e2b04a;
        }
        .form-control:focus, .form-select:focus {
            border-color: #0f3460;
            box-shadow: 0 0 0 0.2rem rgba(15, 52, 96, 0.25);
        }
        .btn-ingresar {
            background: #0f3460;
            border: none;
            padding: 12px;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
        .btn-ingresar:hover { background: #16213e; }
        #alerta { display: none; }
        .spinner-border { width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body>

<div class="card-login">

    <!-- Encabezado -->
    <div class="brand-header">
        <div class="brand-icon"><i class="bi bi-building-fill"></i></div>
        <h3 class="text-white mt-2 mb-1 fw-bold">Inmobiliaria</h3>
        <p class="text-white-50 mb-0">Sistema de Gestión</p>
    </div>

    <!-- Formulario -->
    <div class="bg-white p-4">
        <h5 class="text-center text-secondary mb-4">
            <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
        </h5>

        <div id="alerta" class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span id="alertaMensaje"></span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <div class="input-group">
                <span class="input-group-text bg-light">
                    <i class="bi bi-person-fill text-secondary"></i>
                </span>
                <input type="text" id="nombreUsuario" class="form-control"
                       placeholder="Ingresa tu usuario" autocomplete="username">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <div class="input-group">
                <span class="input-group-text bg-light">
                    <i class="bi bi-lock-fill text-secondary"></i>
                </span>
                <input type="password" id="clave" class="form-control"
                       placeholder="Ingresa tu contraseña" autocomplete="current-password"
                       onkeydown="if(event.key==='Enter') iniciarSesion()">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePass()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button onclick="iniciarSesion()" id="btnIngresar"
                class="btn btn-ingresar btn-primary w-100 text-white fw-semibold">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>

        <hr class="my-3">

        <p class="text-center text-secondary mb-0" style="font-size: 0.92rem;">
            ¿No tienes cuenta?
            <a href="../crearCuenta/crearCuenta.html" class="fw-semibold text-decoration-none"
               style="color: #0f3460;">
                Crear cuenta
            </a>
        </p>
    </div>
</div>

<script src="../api.js"></script>
<script src="login.js"></script>
</body>
</html>
